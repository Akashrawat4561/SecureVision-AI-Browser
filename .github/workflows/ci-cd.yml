name: SecureVision AI Pipeline

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-audit:
    name: Code Security & Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install Security Tools
        run: pip install bandit safety
      - name: Run Bandit (SAST)
        run: bandit -r backend/app -c "bandit.yaml" || true
      - name: Run Safety (Dependency Scan)
        run: safety check -r backend/requirements.txt || true

  backend-test:
    name: Backend Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx
      - name: Execute Pytest Suite
        run: |
          cd backend
          python -m pytest app/tests/ -v --tb=short

  frontend-build:
    name: Frontend Assets Compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"
      - name: Install dependencies and Build
        run: |
          cd frontend
          npm ci
          npm run build

  deploy-staging:
    name: Deploy to Staging Environment (Render/AWS)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Webhook Deployment
        run: |
          echo "Simulating production trigger to Render / EC2 Auto-Scaling Group..."
          # curl -X POST https://api.render.com/deploy/srv-abcd123?key=mock-key
          echo "Deployment initiated successfully."
